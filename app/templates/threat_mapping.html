{% extends 'base.html' %}

{% block content %}
<h1>Threat Mapping</h1>
<div id="cy" style="width: 100%; height: 600px;"></div>
{% endblock %}

{% block scripts %}
<!-- Include Cytoscape.js library -->
<script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

<!-- Your custom script to fetch and render the graph -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/v1/graph')
        .then(response => response.json())
        .then(data => {
            var cy = cytoscape({
                container: document.getElementById('cy'),
                elements: data,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': 'data(name)',
                            'background-color': '#FF5733'  // Red for ThreatActor
                        }
                    },
                    {
                        selector: 'node[label="Content"]',
                        style: {
                            'label': 'data(title)',
                            'background-color': '#66B2FF'  // Blue for Content
                        }
                    },
                    {
                        selector: 'node[label="Location"]',
                        style: {
                            'label': 'data(name)',
                            'background-color': '#33FF57'  // Green for Location
                        }
                    },
                    {
                        selector: 'node[label="Tool"]',
                        style: {
                            'label': 'data(name)',
                            'background-color': '#FFC300'  // Yellow for Tool
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'label': 'data(label)',
                            'line-color': '#ccc',
                            'target-arrow-color': '#ccc',
                            'target-arrow-shape': 'triangle',
                            'arrow-scale': 2
                        }
                    }
                ],
                layout: {
                    name: 'cose',  // Use 'cose' for a force-directed layout
                    idealEdgeLength: 100,
                    nodeRepulsion: 400000,
                    gravity: 80,
                    numIter: 1000,
                    initialTemp: 200,
                    coolingFactor: 0.95,
                    minTemp: 1.0
                }
            });
        })
        .catch(error => console.error('Error fetching graph data:', error));
});
</script>
{% endblock %}
