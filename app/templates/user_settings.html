{% extends "base.html" %}
{% block title %}{{ _('User Settings') }}{% endblock %}

{% block content %}
<div class="container mx-auto px-4">
    <h1 class="text-2xl font-bold mb-4">{{ _('User Settings') }}</h1>
    <form id="user-settings-form">
        <div class="mb-4">
            <label for="theme" class="block mb-2">{{ _('Theme') }}</label>
            <select id="theme" name="theme" class="w-full p-2 border rounded">
                <option value="light" {% if current_user.theme == 'light' %}selected{% endif %}>{{ _('Light') }}</option>
                <option value="dark" {% if current_user.theme == 'dark' %}selected{% endif %}>{{ _('Dark') }}</option>
            </select>
        </div>
        <div class="mb-4">
            <label for="language" class="block mb-2">{{ _('Language') }}</label>
            <select id="language" name="language" class="w-full p-2 border rounded">
                <option value="en" {% if current_user.language == 'en' %}selected{% endif %}>{{ _('English') }}</option>
                <option value="es" {% if current_user.language == 'es' %}selected{% endif %}>{{ _('Spanish') }}</option>
            </select>
        </div>
        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">{{ _('Save Settings') }}</button>
    </form>
</div>

{% block scripts %}
<script>
document.getElementById('user-settings-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    fetch('{{ url_for("user_settings.settings") }}', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token() }}'
        },
        body: JSON.stringify(data),
    })
    .then(response => response.json())
    .then(data => {
        alert(data.message);
    })
    .catch(error => {
        alert('Error updating settings');
    });
});
</script>
{% endblock %}
{% endblock %}
